name: cy_citizenship
description: "Cyprus Citizenship Exam Prep App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  flutter_card_swiper: ^7.0.1
  cached_network_image: ^3.4.1

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.4.4

  # AI
  google_generative_ai: ^0.4.6

  # Payments
  in_app_purchase: ^3.2.0

  # Maps
  google_maps_flutter: ^2.12.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Auth
  google_sign_in: ^6.2.2

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.5
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
