name: cy_citizenship
description: "Cyprus Citizenship Exam Prep App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0
  flutter_card_swiper: ^7.0.1
  cached_network_image: ^3.4.1

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^17.1.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  firebase_analytics: ^12.1.3
  cloud_functions: ^6.0.7

  # Payments
  in_app_purchase: ^3.2.0

  # Maps
  google_maps_flutter: ^2.12.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Auth
  google_sign_in: ^7.2.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.5
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
